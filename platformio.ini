; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; NOTE: Multi-target builds use idf.py directly via build_all_targets.sh (IDF 5.5.4).
; This file is for IDE integration and single-target PlatformIO builds.

[platformio]
src_dir = main

[env]
platform = espressif32@^6.8.0
framework = espidf
board_build.partitions = partitions_example.csv
monitor_filters = direct
monitor_speed = 115200

[env:esp32dev]
board = esp32dev

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32c3"

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3"

; [env:esp32-s3-debug]
; extends = env:esp32-s3-devkitc-1
; upload_protocol = esp-builtin
; debug_tool = esp-builtin
; build_type = debug

[env:esp32-c5-devkitc-1]
board = esp32-c5-devkitc-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32c5"

[env:esp32-c6-devkitc-1]
board = esp32-c6-devkitc-1
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32c6"

[env:wt32-eth01]
board = wt32-eth01
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.wt32_eth01"
    -DSDKCONFIG=sdkconfig.eth
